<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    width: 1200px; height: 630px;
    background: #07070c;
    color: #f3f3f6;
    font-family: 'Space Grotesk', sans-serif;
    position: relative;
    overflow: hidden;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 58px 58px;
    -webkit-mask-image: radial-gradient(120% 90% at 12% 0%, #000 0%, transparent 70%);
  }
  .glow {
    position: absolute; width: 640px; height: 640px;
    right: -160px; top: -200px;
    background: radial-gradient(circle, rgba(236,86,103,0.28), transparent 62%);
    filter: blur(8px);
  }
  .wrap {
    position: relative;
    height: 100%;
    padding: 76px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top { display: flex; align-items: center; gap: 18px; }
  .mark { height: 64px; width: auto; }
  .bname { font-weight: 700; font-size: 30px; letter-spacing: -0.01em; line-height: 1; }
  .bsub {
    font-family: 'JetBrains Mono', monospace; font-weight: 400;
    font-size: 13px; letter-spacing: 0.42em; text-transform: uppercase;
    color: #9a9aac; margin-top: 7px;
  }
  .prompt {
    font-family: 'JetBrains Mono', monospace; font-size: 19px;
    color: #9a9aac; margin-bottom: 22px;
  }
  .prompt .path { color: #e09176; }
  .prompt .cmd { color: #f3f3f6; }
  h1 {
    font-weight: 700; font-size: 78px; line-height: 0.99;
    letter-spacing: -0.035em;
  }
  .grad {
    background: linear-gradient(120deg, #ec5667 0%, #e09176 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .lede {
    margin-top: 26px; font-size: 25px; color: #c4c4d2; max-width: 760px;
    line-height: 1.4; font-weight: 500;
  }
  .bottom { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .chip {
    font-family: 'JetBrains Mono', monospace; font-size: 17px;
    color: #f3f3f6; border: 1px solid rgba(255,255,255,0.16);
    padding: 9px 18px; border-radius: 999px;
  }
  .chip.accent { border-color: #ec5667; background: rgba(236,86,103,0.12); }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="wrap">
    <div class="top">
      <img class="mark" src="../public/logo.png" alt="" />
      <div>
        <div class="bname">Core Edge Academy</div>
        <div class="bsub">Academy</div>
      </div>
    </div>

    <div>
      <div class="prompt"><span class="path">~/core-edge</span> $ <span class="cmd">enroll --industry-ready</span></div>
      <h1>We turn beginners<br />into <span class="grad">engineers.</span></h1>
      <div class="lede">Industry-ready IT training in AI, DevOps, Full Stack, Data Analytics &amp; Cyber Security — Ameerpet, Hyderabad.</div>
    </div>

    <div class="bottom">
      <span class="chip accent">100% Practical</span>
      <span class="chip">Live Projects</span>
      <span class="chip">Placement Support</span>
      <span class="chip">Online &amp; Offline</span>
    </div>
  </div>
</body>
</html>
